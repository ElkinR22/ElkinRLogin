<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ingreso Seguro — Empresa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <main class="card">
      <div class="brand">
        <div class="logo">FRZ</div>
        <div><h2>Ingreso privado</h2><p>Acceso solo para personal autorizado</p></div>
      </div>

      <h1 class="title">Iniciar sesión</h1>

      <form id="loginForm" class="login-form" autocomplete="off">
        <label for="username">Usuario</label>
        <input id="username" name="username" class="input" type="text" required placeholder="Usuario">

        <label for="password">Contraseña</label>
        <input id="password" name="password" class="input" type="password" required placeholder="Contraseña">

        <div class="row">
          <label class="checkbox"><input id="remember" type="checkbox"> Recordarme</label>
          <a class="link-muted" href="#" onclick="alert('Contacta con TI')">¿Olvidaste?</a>
        </div>

        <div style="margin-top:8px;display:flex;gap:10px;">
          <button type="submit" class="btn">Entrar</button>
        </div>

        <div id="feedback" class="small-muted"></div>
      </form>
    </main>

    <aside class="dashboard" id="dashboard" hidden>
      <div class="dash-top">
        <div>
          <div class="welcome">Bienvenido, <span id="userNameDisplay">User</span></div>
          <div class="small-muted">Mensajería interna</div>
        </div>
        <div>
          <button id="logoutBtn" class="btn secondary">Cerrar sesión</button>
        </div>
      </div>

      <div class="chat">
        <div id="messages" class="messages"></div>
        <form id="chatForm" class="chat-form">
          <input id="chatInput" placeholder="Escribe mensaje..." autocomplete="off">
          <button class="btn">Enviar</button>
        </form>
      </div>
    </aside>
  </div>

  <script src="main.js"></script>
</body>
</html>
